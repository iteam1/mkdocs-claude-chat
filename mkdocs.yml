site_name: "mkdocs-claude-chat"
site_description: "MkDocs plugin to add a Claude-powered chatbot to your documentation site."
site_url: "https://iteam1.github.io/mkdocs-claude-chat"
repo_url: "https://github.com/iteam1/mkdocs-claude-chat"

watch: [mkdocs.yml, README.md, src/mkdocs_claude_chat]

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

plugins:
  - search
  - kroki:
      server_url: https://kroki.io
      enable_mermaid: false  # handled by Material native Mermaid
      fence_prefix: ""       # use bare language names (plantuml, graphviz, etc.)
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            filters: ["!^_"]
            show_source: true
            show_root_heading: true
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Getting Started:
          - index.md
          - getting-started/installation.md
          - getting-started/quickstart.md
        Configuration:
          - configuration.md
        Reference:
          - reference/api.md
          - reference/architecture.md
        Troubleshooting:
          - troubleshooting.md
  - claude-chat:  # dogfood
      model: claude-sonnet-4-6

